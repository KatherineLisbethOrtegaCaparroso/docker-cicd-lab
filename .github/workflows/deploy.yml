name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Google Cloud
      uses: google-github-actions/setup-gcloud@v1
      with:
        project_id: lab-docker-cloud
        service_account_key: ${{ secrets.GCP_SA_KEY }}

    - name: Configure Docker
      run: gcloud auth configure-docker

    - name: Build and push image
      run: |
        docker build -t us-central1-docker.pkg.dev/lab-docker-cloud/docker-repo/mi-app-docker .
        docker push us-central1-docker.pkg.dev/lab-docker-cloud/docker-repo/mi-app-docker

    - name: Deploy to Cloud Run
      run: |
        gcloud run deploy mi-app \
          --image us-central1-docker.pkg.dev/lab-docker-cloud/docker-repo/mi-app-docker \
          --region us-central1 \
          --platform managed \
          --allow-unauthenticated
